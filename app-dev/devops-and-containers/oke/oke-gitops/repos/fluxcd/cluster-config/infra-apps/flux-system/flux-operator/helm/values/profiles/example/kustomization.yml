apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      reconcile.fluxcd.io/watch: Enabled

resources:
  - ../../base

configMapGenerator:
  - name: ${component}-values-${profile}
    files:
      - values.yaml=./values.yml

# In case you have some values that contains secrets, encrypt them with SOPS beforehand
secretGenerator:
  - name: ${component}-values-${profile}
    files:
      - values.yaml=./secrets.yml

generatorOptions:
  disableNameSuffixHash: true