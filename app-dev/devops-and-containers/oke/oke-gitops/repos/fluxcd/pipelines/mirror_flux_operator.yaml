version: 0.1
component: build
timeoutInSeconds: 10000
runAs: root
shell: bash

env:
  variables:
    repo_compartment_id: ""
    repo_prefix: ""
    region: ""
    region_key: ""
    chart_name: "flux-operator"
    chart_repo: "oci://ghcr.io/controlplaneio-fluxcd/charts"
    chart_version: ""
    source_controller_version: ""
    kustomize_controller_version: ""
    helm_controller_version: ""
    namespace: "flux-system"   # The Helm Chart will be deployed in this namespace

  exportedVariables:
    - "chart_version"
    - "chart_name"
    - "region_key"
    - "tenancy_namespace"
    - "repo_path"
    - "repo_prefix"
    - "namespace"

steps:

  - type: Command
    name: "Load variables"
    failImmediatelyOnError: true
    command: |
      source ./variables.sh
      source ./flux-vars.sh
      export OCI_CLI_REGION=${region}
      region_key=$(oci iam region list --query "data[?name == '$region'].key | [0]" --raw-output);
      export region_key=$(echo "$region_key" | tr '[:upper:]' '[:lower:]');
      export tenancy_namespace=$(oci artifacts container configuration get --compartment-id "${repo_compartment_id}" --query data.namespace --raw-output);
    onFailure:
      - type: Command
        command: |
          echo "Error loading common environment variables";
        timeoutInSeconds: 400

  - type: Command
    name: "Mirror Helm Chart"
    failImmediatelyOnError: true
    command: |
      export OCI_CLI_REGION=${region}
      helm_repo_prefix="${repo_prefix}/helm"
      ./script/mirror-helm.sh -c "${repo_compartment_id}" -k "${region_key}" -v "${chart_version}" -n "${chart_name}" -p "${helm_repo_prefix}" -r "${chart_repo}"
    onFailure:
      - type: Command
        command: |
          echo "Error mirroring Helm Chart to OCIR";
        timeoutInSeconds: 400

  - type: Command
    timeoutInSeconds: 400
    name: "Mirror Helm Images"
    failImmediatelyOnError: true
    command: |
      export OCI_CLI_REGION=${region}
      ./script/mirror-helm-image.sh -c "${repo_compartment_id}" -k "${region_key}" -v "${chart_version}" -n "${chart_name}" -r "${chart_repo}" -p "${repo_prefix}"
    onFailure:
      - type: Command
        command: |
          echo "Failed mirrored images in the Helm Chart!";

  - type: Command
    timeoutInSeconds: 600
    name: "Mirror Images"
    failImmediatelyOnError: true
    command: |
      export OCI_CLI_REGION=${region}
      IMAGES=(
        "ghcr.io/fluxcd/source-controller:${source_controller_version}"
        "ghcr.io/fluxcd/kustomize-controller:${kustomize_controller_version}"
        "ghcr.io/fluxcd/helm-controller:${helm_controller_version}"
      )
      for image in "${IMAGES[@]}"; do
        ./script/mirror-image.sh -c "${repo_compartment_id}" -k "${region_key}" -p "${repo_prefix}" -i "$image"
      done
    onFailure:
      - type: Command
        command: |
          echo "Failed to mirror images to OCIR!";
        timeoutInSeconds: 400
