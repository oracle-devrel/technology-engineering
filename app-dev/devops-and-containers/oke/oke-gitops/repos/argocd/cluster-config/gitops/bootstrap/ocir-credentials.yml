apiVersion: v1
kind: Secret
metadata:
  name: ocir-oci-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  type: oci
  url: "oci://<region-key>.ocir.io/<tenancy-namespace>"
  username: "<tenancy-namespace>/<identity-domain-name>/<username>"
  password: "<auth-token>"