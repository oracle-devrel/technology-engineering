apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-bootstrap-example
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ${git_repo_url}.git
    targetRevision: HEAD
    path: gitops/types/example
    directory:
      recurse: true
      exclude: "*.json"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true