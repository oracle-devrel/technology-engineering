#cloud-config

# Example for Kubernetes 1.32 and later.
# Change this prefix to match your organization, environment, or application.
runcmd:
  - |
    CUSTOM_PREFIX="prod-api"

    # Derive a unique suffix from the default OCI hostname.
    # Example default hostname: oke-cqrst...-1234
    HOST_ID="$(hostname | awk -F'-' '{print $NF}')"
    NODE_NAME="${CUSTOM_PREFIX}-${HOST_ID}"

    # Expand the root partition and filesystem to use the configured boot volume size.
    bash /usr/libexec/oci-growfs -y

    curl --fail -H "Authorization: Bearer Oracle" -L0 \
      http://169.254.169.254/opc/v2/instance/metadata/oke_init_script \
      | base64 --decode > /var/run/oke-init.sh

    bash /var/run/oke-init.sh \
      --kubelet-extra-args "--hostname-override=${NODE_NAME}"
