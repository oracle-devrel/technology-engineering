title: OKE RM - OKE Cluster
description: Stack to provision the OKE Cluster
informationalText: OKE Cluster stack
schemaVersion: 1.1.0
version: "20190304"
locale: "en"


variableGroups:

  - title: "Hidden"
    visible: false
    variables:
      - tenancy_ocid
      - region

  - title: "Network"
    variables:
      - network_compartment_id
      - cni_type
      - vcn_id
      - lb_subnet_id
      - cp_subnet_id
      - worker_subnet_id
      - pod_subnet_id
      - cp_nsg_id
      - worker_nsg_id
      - pod_nsg_id
      - cp_allowed_cidr_list

  - title: "Cluster"
    variables:
      - oke_compartment_id
      - cluster_name
      - kubernetes_version
      - cluster_type
      - services_cidr
      - pods_cidr

  - title: "Add-ons"
    visible:
      eq:
        - ${cluster_type}
        - enhanced
    variables:
      - enable_cert_manager
      - enable_metrics_server

  - title: "Security"
    variables:
      - kms_compartment_id
      - oke_vault_id
      - cluster_kms_key_id

  - title: "Policies"
    variables:
      - home_region
      - enable_policies
      - policies_dry_run
      - create_karpenter_policies
      - iam_domain_compartment_id
      - karpenter_iam_domain_id
      - karpenter_dynamic_group_name
      - create_karpenter_cluster_placement_group_policy_optional
      - create_karpenter_tag_policy_optional
      - tag_compartment_id
      - create_karpenter_capacity_reservation_policy_optional
      - create_karpenter_compute_cluster_policy_optional
      - create_autoscaler_policies

  - title: "OIDC"
    visible:
      eq:
        - ${cluster_type}
        - enhanced
    variables:
      - enable_oidc_discovery
      - enable_oidc_authentication
      - oidc_issuer
      - oidc_client_id
      - oidc_username_claim
      - oidc_username_prefix
      - oidc_groups_claim
      - oidc_groups_prefix

variables:

  region:
    title: "Region"
    type: oci:identity:region:name
    required: true

# NETWORK

  network_compartment_id:
    title: "Network Compartment"
    description: "Compartments where the network resources for OKE are present"
    type: oci:identity:compartment:id
    default: ${compartment_ocid}
    required: true

  cni_type:
    title: "CNI Type"
    description: "CNI to use for the OKE cluster"
    type: enum
    enum:
      - vcn_native
      - flannel
    required: true

  vcn_id:
    title: "VCN id"
    description: "Existing VCN where to create the OKE cluster"
    type: oci:core:vcn:id
    dependsOn:
      compartmentId: ${network_compartment_id}
    required: true

  lb_subnet_id:
    title: "Default Load Balancer Subnet"
    description: "Existing Subnet where all Load Balancer services will be created by default"
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
      hideAdSubnet: true
    required: true

  cp_subnet_id:
    title: "Control Plane Subnet"
    description: "Existing Subnet that will host the Control Plane"
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
      hideAdSubnet: true
    required: true

  worker_subnet_id:
    title: "Worker Subnet"
    description: "Existing Subnet that will host the OKE Worker Nodes"
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
      hidePublicSubnet: true
      hideAdSubnet: true
    required: true

  pod_subnet_id:
    title: "Pod Subnet"
    description: "Existing Subnet that will host the OKE Pods"
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
      hidePublicSubnet: true
      hideAdSubnet: true
    required: true
    visible:
      eq:
        - ${cni_type}
        - vcn_native

  cp_nsg_id:
    title: "Control Plane NSG"
    description: "Existing NSG to attach to the Control Plane OKE API Server"
    type: oci:core:nsg:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
    required: true

  worker_nsg_id:
    title: "Worker NSG"
    description: "Existing NSG to attach to the OKE worker nodes"
    type: oci:core:nsg:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
    required: true

  pod_nsg_id:
    title: "Pod NSG"
    description: "Existing NSG to attach to pods"
    type: oci:core:nsg:id
    dependsOn:
      compartmentId: ${network_compartment_id}
      vcnId: ${vcn_id}
    required: true
    visible:
      eq:
        - ${cni_type}
        - vcn_native

  cp_allowed_cidr_list:
    title: "Control Plane allowed CIDR blocks"
    description: "Allowed CIDR blocks that can reach the OKE Control Plane"
    type: array
    items:
      type: string
      pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-9]|[1-2][0-9]|3[0-2])$"
    required: true

# CLUSTER

  oke_compartment_id:
    title: "OKE Cluster Compartment"
    description: "Compartment where to create the OKE Cluster"
    type: oci:identity:compartment:id
    default: ${compartment_ocid}
    required: true

  cluster_name:
    title: "OKE Cluster name"
    description: "Name of the OKE cluster"
    type: string
    required: true

  kubernetes_version:
    type: oci:kubernetes:versions:id
    title: "Kubernetes version"
    description: "The Oracle cloud kubernetes version for the cluster"
    required: true
    dependsOn:
      compartmentId: ${oke_compartment_id}
      clusterOptionId: "all"

  cluster_type:
    title: "OKE cluster type"
    description: "Enhanced clusters are recommended"
    type: enum
    enum:
      - enhanced
      - basic
    required: true

  services_cidr:
    title: "Services CIDR"
    description: "Internal Kubernetes services CIDR block. Must not overlap with any VCN CIDR block"
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-9]|[1-2][0-9]|3[0-2])$"
    required: true

  pods_cidr:
    title: "Pods CIDR"
    description: "Internal Pod CIDR block. Must not overlap with any VCN CIDR block"
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-9]|[1-2][0-9]|3[0-2])$"
    required: true
    visible:
      eq:
        - ${cni_type}
        - flannel

# ADD-ONS

  enable_cert_manager:
    title: "Enable cert-manager"
    description: "Enable the cert-manager add-on in the cluster"
    type: boolean

  enable_metrics_server:
    title: "Enable metrics-server"
    description: "Enable the metrics-server add-on in the cluster"
    type: boolean
    visible: ${enable_cert_manager}

# SECURITY

  kms_compartment_id:
    title: "Vault Compartment"
    description: "Compartments where the key to encrypt the OKE cluster resides"
    type: oci:identity:compartment:id
    default: ${compartment_ocid}

  oke_vault_id:
    type: oci:kms:vault:id
    title: "Vault"
    description: "Vault where the key to encrypt the OKE cluster is located"
    dependsOn:
      compartmentId: ${oke_vault_compartment_id}

  cluster_kms_key_id:
    type: oci:kms:key:id
    title: "OKE encryption key"
    description: "Key used to encrypt secrets located in etcd. A POLICY for the cluster will be also created if Enable Policies is enabled in the stack"
    dependsOn:
      compartmentId: ${oke_vault_compartment_id}
      vaultId: ${oke_vault_id}

# POLICIES

  home_region:
    title: "Home Region"
    type: oci:identity:region:name
    default: ${region}
    required: true

  enable_policies:
    title: "Enable policies"
    description: "Let this stack create or display policies for OKE and tools"
    type: boolean

  policies_dry_run:
    title: "Enable policy dry-run"
    description: "Only output the needed policies, without creating them"
    type: boolean
    visible: ${enable_policies}

  create_karpenter_policies:
    title: "Create Karpenter policies"
    description: "Policies will be created for Karpenter using Workload Identity authentication mode"
    type: boolean
    visible: ${enable_policies}

  iam_domain_compartment_id:
    title: "Domain Compartment"
    description: "Compartment where the IAM domain is located"
    type: oci:identity:compartment:id
    default: ${tenancy_ocid}
    required: true
    visible: ${create_karpenter_policies}

  karpenter_iam_domain_id:
    type: oci:identity:domains:id
    title: "Karpenter Identity Domain"
    description: "Domain where to create the Karpenter Dynamic Group"
    dependsOn:
      compartmentId: ${iam_domain_compartment_id}
    required: true
    visible: ${create_karpenter_policies}

  karpenter_dynamic_group_name:
    title: "Karpenter Dynamic Group Name"
    description: "Name of the Karpenter Dynamic Group - MUST be unique across all groups in the tenancy (dynamic groups and user groups). You can't change the name later"
    type: string
    required: true
    visible: ${create_karpenter_policies}

  create_karpenter_cluster_placement_group_policy_optional:
    title: "Create Karpenter optional policy - cluster placement group"
    description: "Create the required policy to create cluster placement group instances with Karpenter"
    type: boolean
    visible:
      and:
        - ${enable_policies}
        - ${create_karpenter_policies}

  create_karpenter_tag_policy_optional:
    title: "Create Karpenter optional policy - defined tag"
    description: "Create the required policy to tag instances with Karpenter"
    type: boolean
    visible:
      and:
        - ${enable_policies}
        - ${create_karpenter_policies}

  tag_compartment_id:
    title: "Defined Tag compartment"
    description: "Compartments where the defined tags are located"
    type: oci:identity:compartment:id
    default: ${compartment_ocid}
    visible:
      and:
        - ${enable_policies}
        - ${create_karpenter_policies}
        - ${create_karpenter_tag_policy_optional}

  create_karpenter_capacity_reservation_policy_optional:
    title: "Create Karpenter optional policy - capacity reservation"
    description: "Create the required policy to use capacity reservation with Karpenter"
    type: boolean
    visible:
      and:
        - ${enable_policies}
        - ${create_karpenter_policies}

  create_karpenter_compute_cluster_policy_optional:
    title: "Create Karpenter optional policy - compute cluster"
    description: "Create the required policy to create compute cluster instances with Karpenter"
    type: boolean
    visible:
      and:
        - ${enable_policies}
        - ${create_karpenter_policies}

  create_autoscaler_policies:
    title: "Create cluster autoscaler policies"
    description: "Policies will be created for the cluster autoscaler using Workload Identity authentication mode"
    type: boolean
    visible: ${enable_policies}

# OIDC

  enable_oidc_discovery:
    title: "Enable OIDC Discovery"
    description: "Enable OKE to act as an Identity Provider to exchange pod SeviceAccounts for access tokens"
    type: boolean

  enable_oidc_authentication:
    title: "Enable OIDC Authentication"
    description: "Enable OIDC authentication performed by an external OIDC Identity Provider"
    type: boolean

  oidc_issuer:
    title: "OIDC Issuer URL"
    description: "URL of the external Identity Provider token issuer. Control Plane MUST be able to reach it"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  oidc_client_id:
    title: "OIDC Client Id"
    description: "OIDC Client Id on the external Identity Provider"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  oidc_username_claim:
    title: "OIDC username claim"
    description: "Claim representing the username"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  oidc_username_prefix:
    title: "OIDC username prefix"
    description: "Prefix prepended to the username"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  oidc_groups_claim:
    title: "OIDC groups claim"
    description: "Claim representing the groups"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  oidc_groups_prefix:
    title: "OIDC groups prefix"
    description: "Prefix prepended to the groups"
    type: string
    required: true
    visible: ${enable_oidc_authentication}

  tag_value:
    type: oci:identity:tag:value
    title: Tags


# OUTPUT SECTION

outputGroups:
  - title: OKE
    outputs:
      - cluster_id
      - worker_pools
      - oidc_discovery_endpoint

outputs:
  cluster_id:
    type: ocid
    title: OKE Cluster OCID

  worker_pools:
    type: map
    title: Worker Pools

  oidc_discovery_endpoint:
    type: link
    title: OIDC Discovery Endpoint

  policy_statements:
    type: array
    title: Required policies