name: Validate Detection Rules

on:
  push:
    paths:
      - 'rules/**'
      - 'queries/hunting/**'
      - 'config/**'
      - 'scripts/convert_sigma.py'
      - 'scripts/generate_catalog.py'
      - 'scripts/audit_rule_quality.py'
      - 'scripts/map_atomic_tests.py'
      - 'config/art_index.csv'
  pull_request:
    paths:
      - 'rules/**'
      - 'queries/hunting/**'
      - 'config/**'
      - 'scripts/convert_sigma.py'
      - 'scripts/generate_catalog.py'
      - 'scripts/audit_rule_quality.py'
      - 'scripts/map_atomic_tests.py'
      - 'config/art_index.csv'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Convert Sigma rules to OCL
        run: python3 scripts/convert_sigma.py

      - name: Validate OCL syntax
        run: python3 scripts/convert_sigma.py --validate

      - name: Print rule statistics
        run: python3 scripts/convert_sigma.py --stats

      - name: Generate catalog
        run: python3 scripts/generate_catalog.py

      - name: Verify rule count
        run: |
          RULE_COUNT=$(find rules -name '*.yaml' -type f | wc -l)
          QUERY_COUNT=$(find queries -name '*.json' -not -name 'manifest.json' -not -name 'catalog.json' -maxdepth 1 | wc -l)
          echo "Rules: $RULE_COUNT, Queries: $QUERY_COUNT"
          # Some rules (multi-selection Sigma rules) generate more than one
          # query, so exact equality is wrong. Every rule must generate at
          # least one query — check queries >= rules and queries > 0.
          if [ "$QUERY_COUNT" -lt "$RULE_COUNT" ] || [ "$QUERY_COUNT" -eq 0 ]; then
            echo "ERROR: Query count ($QUERY_COUNT) is lower than rule count ($RULE_COUNT) — some rules failed to convert."
            exit 1
          fi

      - name: Verify YAML validity
        run: |
          python3 -c "
          import yaml, sys, os
          errors = 0
          for root, dirs, files in os.walk('rules'):
              for f in sorted(files):
                  if f.endswith('.yaml'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              rule = yaml.safe_load(fh)
                          if not rule or 'detection' not in rule:
                              print(f'WARN: {path} missing detection block')
                              errors += 1
                          if not rule.get('title'):
                              print(f'WARN: {path} missing title')
                              errors += 1
                          if not rule.get('logsource'):
                              print(f'WARN: {path} missing logsource')
                              errors += 1
                      except Exception as e:
                          print(f'ERROR: {path}: {e}')
                          errors += 1
          if errors:
              print(f'\n{errors} issues found')
              sys.exit(1)
          print('All YAML rules valid')
          "

      - name: Check for deprecated event types
        run: |
          if grep -r "com\.oraclecloud\.identity\." rules/ --include="*.yaml" | grep -v identitycontrolplane; then
            echo "ERROR: Found deprecated identity event types (should use identitycontrolplane)"
            exit 1
          fi
          echo "No deprecated event types found"

      - name: Run quality audit
        run: python3 scripts/audit_rule_quality.py --report docs/RULE_QUALITY_REPORT.md

      - name: Verify zero quality issues
        run: |
          if grep -q 'Total.*\*\*0\*\*' docs/RULE_QUALITY_REPORT.md; then
            echo "Quality audit: PASS (0 issues)"
          else
            echo "Quality audit: FAIL — see docs/RULE_QUALITY_REPORT.md"
            cat docs/RULE_QUALITY_REPORT.md
            exit 1
          fi

      - name: Download ART index
        run: python3 scripts/map_atomic_tests.py --download

      - name: Enrich queries with ART mappings
        run: python3 scripts/map_atomic_tests.py --enrich

      - name: Validate ART mappings
        run: python3 scripts/map_atomic_tests.py --validate

      - name: ART coverage report and stats
        run: python3 scripts/map_atomic_tests.py --report --stats

      - name: Validate hunting queries JSON
        run: |
          python3 -c "
          import json, os, sys
          errors = 0
          hunting_dir = 'queries/hunting'
          if not os.path.isdir(hunting_dir):
              print('No hunting directory found, skipping')
              sys.exit(0)
          for f in sorted(os.listdir(hunting_dir)):
              if not f.endswith('.json'):
                  continue
              path = os.path.join(hunting_dir, f)
              try:
                  with open(path) as fh:
                      data = json.load(fh)
                  if not data.get('title'):
                      print(f'WARN: {path} missing title')
                      errors += 1
                  if not data.get('query'):
                      print(f'WARN: {path} missing query')
                      errors += 1
                  if data.get('type') != 'hunting':
                      print(f'WARN: {path} missing type=hunting')
                      errors += 1
              except Exception as e:
                  print(f'ERROR: {path}: {e}')
                  errors += 1
          count = len([f for f in os.listdir(hunting_dir) if f.endswith('.json')])
          if errors:
              print(f'{errors} issues in {count} hunting queries')
              sys.exit(1)
          print(f'All {count} hunting queries valid')
          "
