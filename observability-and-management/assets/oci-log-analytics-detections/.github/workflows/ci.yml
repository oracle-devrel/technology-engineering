name: CI

# Non-live local release gates. Runs on every push and PR.
# NOTHING in this file may require OCI credentials — the live parser/dashboard
# gates live in a separate, manually-dispatched workflow (live-validation.yml)
# so they are never executed automatically on untrusted fork PRs.
on:
  push:
  pull_request:

# Read-only token. This workflow never needs write access to the repo, and
# (because it uses the safe `pull_request` trigger, not `pull_request_target`)
# fork PRs run with NO access to repository or environment secrets.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Local release gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # test_data/ is gitignored, so a fresh checkout has none. A few integration
      # tests assert the ingest manifest exactly matches the generated synthetic
      # datasets, which come from two offline generators (no --validate => no OCI):
      # the core security datasets and the multicloud geo-health dataset.
      - name: Generate synthetic test data
        run: |
          python scripts/generate_test_logs.py --days 1
          python scripts/generate_geo_health_logs.py --duration 60 --interval 5

      # --- Gate 1: unit/integration test suite (no OCI required) ---
      - name: Pytest
        run: python -m pytest scripts/ -q

      # --- Gate 2: Sigma -> OCL conversion validates with zero warnings ---
      # convert_sigma.py --validate regenerates the queries and validates them;
      # it exits non-zero on warnings/errors. No OCI access required.
      - name: Validate Sigma -> OCL conversion (fail on warnings)
        run: python scripts/convert_sigma.py --validate

      # --- Gate 3: catalog drift ---
      # Regenerate the catalog and fail if anything other than the embedded
      # `generated_at` timestamp changed. A non-empty (timestamp-normalized)
      # diff means CATALOG.md / queries/catalog.json were not regenerated after
      # a rule/query change.
      - name: Catalog drift check
        run: |
          set -euo pipefail
          python scripts/generate_catalog.py
          # Ignore only the volatile generated_at timestamp line, then assert
          # there are no remaining differences in the committed catalog files.
          DRIFT="$(git diff --no-color -- CATALOG.md queries/catalog.json \
            | grep -E '^[+-]' \
            | grep -Ev '^[+-]{2}' \
            | grep -Ev '"generated_at"' \
            || true)"
          if [ -n "$DRIFT" ]; then
            echo "::error::Catalog drift detected. Run 'python scripts/generate_catalog.py' and commit CATALOG.md + queries/catalog.json."
            echo "----- drift (timestamp-normalized) -----"
            echo "$DRIFT"
            exit 1
          fi
          echo "Catalog is in sync (only the generated_at timestamp differs)."

      # --- Gate 4: README/STATUS inventory reconciliation vs catalog ---
      - name: Inventory drift check (README/STATUS vs catalog)
        run: python scripts/check_inventory_drift.py

      # --- Gate 5: no sensitive/tenancy values committed ---
      # Always-on (not only inside release_checklist.py): scans the tree for
      # OCIDs, LA namespaces, opc-request-ids, secrets, and internal public IPs,
      # including generated reports under queries/. Exits non-zero on any finding.
      - name: Sensitive value scan
        run: python scripts/scan_sensitive_values.py --json

      # --- Gate 6: Sentinel-fixture byte-identity check ---
      # regen_promoted.py --check compares the committed KQL/Logan fixture files
      # under scripts/test_kql/fixtures/ against canonical(query) for every
      # promoted Sentinel query in queries/sentinel/.  It is purely read-only
      # (never writes) and exits non-zero on drift.
      #
      # Choice rationale: regen_promoted.py --check exits 0 on current main
      # (only skips the one C2-IP fixture that scan_sensitive_values.py would
      # flag anyway).  Because the gate is green on main we wire it as a hard
      # failure (no continue-on-error) so fixture drift is caught on every PR.
      - name: Sentinel fixture byte-identity check (regen_promoted --check)
        run: python3 scripts/test_kql/regen_promoted.py --check

      # --- Gate 7: module-size enforcement ---
      # 7a. Existing pytest gate: asserts convert_sentinel_kql.py stays ≤800 lines.
      - name: Module-size pytest (convert_sentinel_kql facade)
        run: python -m pytest scripts/test_kql/test_module_size.py -q

      # 7b. Broad gate: fails if any NEW scripts/*.py exceeds 800 lines.
      # Pre-existing oversized files are in an explicit allowlist inside
      # check_module_size.py and produce warnings only.  That allowlist MUST
      # shrink over time — see the script for the refactor backlog.
      - name: Module-size gate (new scripts/*.py must stay ≤800 lines)
        run: python3 scripts/check_module_size.py
