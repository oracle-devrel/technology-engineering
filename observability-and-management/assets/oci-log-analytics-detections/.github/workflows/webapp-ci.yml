name: Webapp CI

# Type-check, lint, build, and API-contract e2e for the Forge webapp.
# Runs only when webapp/ source or this workflow file changes.
# NO OCI credentials required — all tests run purely locally.
on:
  push:
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci.yml'
  pull_request:
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci.yml'

permissions:
  contents: read

concurrency:
  group: webapp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapp:
    name: Webapp type / lint / build / e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # pnpm version must match webapp/package.json `packageManager` field
      # (currently pnpm@10.26.1, same as forge-github-pages.yml).
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      # Node version must match forge-github-pages.yml (node-version: 22).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      # --- Step 1: dependencies ---
      - name: Install webapp dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      # --- Step 2: type checking ---
      # tsc --noEmit: fails on any TypeScript type error.
      - name: Typecheck
        working-directory: webapp
        run: pnpm typecheck

      # --- Step 3: linting ---
      # ESLint with the project's own config (.eslintrc / eslint.config.mjs).
      - name: Lint
        working-directory: webapp
        run: pnpm lint

      # --- Step 4: production build ---
      # Verifies the Next.js app compiles end-to-end; also exercises any
      # build-time data fetching (artifact loading from queries/).
      - name: Build
        working-directory: webapp
        run: pnpm build

      # --- Step 5: Playwright browser install ---
      # Install Chromium only — the api-contract tests are browser-agnostic HTTP
      # request tests so a single browser is sufficient and fastest.
      - name: Install Playwright browsers (Chromium only)
        working-directory: webapp
        run: pnpm exec playwright install --with-deps chromium

      # --- Step 6: API-contract e2e tests ---
      # playwright.config.ts auto-starts `next dev` as the web server when
      # PLAYWRIGHT_BASE_URL is unset.  CI=true enables retries:2 and
      # forbids test.only usage.  Tests cover /api/health, /api/forge/session,
      # /api/forge/artifacts, and the middleware surface boundary.
      - name: API-contract e2e tests
        working-directory: webapp
        env:
          CI: true
        run: pnpm exec playwright test tests/e2e/api-contract.spec.ts

      # Upload the Playwright HTML report on failure so test failures are
      # diagnosable without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7
