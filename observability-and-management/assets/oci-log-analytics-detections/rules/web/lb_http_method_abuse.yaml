title: Suspicious HTTP Method Usage
id: a1010013-owasp-a05-httpmethod-001
status: stable
version: 1
description: Detects use of unusual or dangerous HTTP methods (PUT, DELETE, TRACE, OPTIONS, PATCH) that may indicate API abuse or security misconfiguration. OWASP A05:2021 Security Misconfiguration.
logsource:
  product: oci
  service: loadbalancer
detection:
  selection:
    http_method:
    - PUT
    - DELETE
    - TRACE
    - CONNECT
    - PATCH
  condition: selection
level: low
tags:
- attack.initial_access
- attack.t1190
- owasp.a05
falsepositives:
- RESTful APIs using PUT/DELETE/PATCH for CRUD operations
- CORS preflight OPTIONS requests
