title: WAF CORS Bypass Attempt Blocked
id: a1010029-owasp-a05-cors-001
status: stable
version: 1
description: Detects CORS misconfiguration exploitation attempts where attackers try to bypass cross-origin restrictions. OWASP A05:2021 Security Misconfiguration.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  cors_patterns:
    request_headers|contains:
    - "Origin: null"
    - "Origin: http://evil"
    - "Origin: https://evil"
    - "Origin: http://attacker"
    - "Access-Control-Allow-Origin: *"
  condition: selection and cors_patterns
level: medium
tags:
- attack.initial_access
- attack.t1189
- owasp.a05
falsepositives:
- Mobile apps with custom origin headers
- Browser extensions modifying headers
