title: Suspicious or Empty User Agent Detected
id: a1010028-owasp-recon-ua-001
status: stable
version: 1
description: Detects requests with empty, missing, or known-malicious user agents. Automated attack tools often use non-standard user agents or omit them entirely.
logsource:
  product: oci
  service: loadbalancer
detection:
  empty_ua:
    user_agent: ""
  malicious_ua:
    user_agent|contains:
    - "<?php"
    - "${jndi"
    - "<script"
    - "() { :;}"
    - "shellshock"
    - "masscan"
    - "zgrab"
    - "censys"
    - "shodan"
    - "internetmeasurement"
  condition: empty_ua or malicious_ua
level: medium
tags:
- attack.reconnaissance
- attack.t1595
- owasp.a09
falsepositives:
- Internal monitoring tools with custom user agents
- Health check probes
