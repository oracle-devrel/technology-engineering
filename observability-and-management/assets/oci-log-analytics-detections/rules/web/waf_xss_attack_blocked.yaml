title: WAF Cross-Site Scripting Attack Blocked
id: a1010003-owasp-a03-xss-block-001
status: stable
version: 1
description: Detects XSS (Cross-Site Scripting) attempts blocked by OCI WAF. Part of OWASP A03:2021 Injection category.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  xss_patterns:
    request_url|contains:
    - "<script"
    - "<SCRIPT"
    - javascript:
    - "onerror="
    - "onload="
    - "onmouseover="
    - "onfocus="
    - "onclick="
    - "onsubmit="
    - "<img src=x"
    - "<svg onload"
    - "<iframe"
    - "alert("
    - "prompt("
    - "confirm("
    - "document.cookie"
    - "document.location"
    - "window.location"
    - "eval("
    - "String.fromCharCode"
    - "atob("
  xss_rules:
    rule_key|contains:
    - "941"
  condition: selection and (xss_patterns or xss_rules)
level: high
tags:
- attack.initial_access
- attack.t1189
- owasp.a03
falsepositives:
- Developers testing JavaScript in form fields
- Rich text editors with script content
