title: Web Directory Enumeration Detected
id: a1010011-owasp-a01-direnum-001
status: stable
version: 1
description: Detects directory and file enumeration attempts via high volume of 404 responses to common admin/config paths. OWASP A01:2021 Broken Access Control.
logsource:
  product: oci
  service: loadbalancer
detection:
  selection:
    response_code: "404"
  enum_paths:
    request_url|contains:
    - /admin
    - /administrator
    - /wp-admin
    - /wp-login
    - /phpmyadmin
    - /phpMyAdmin
    - /.env
    - /.git
    - /.svn
    - /config
    - /backup
    - /db
    - /database
    - /debug
    - /console
    - /swagger
    - /api-docs
    - /actuator
    - /graphql
    - /graphiql
    - /server-status
    - /server-info
    - /robots.txt
    - /sitemap.xml
    - /crossdomain.xml
    - /.well-known
    - /composer.json
    - /package.json
    - /web.config
    - /Dockerfile
  condition: selection and enum_paths
level: low
tags:
- attack.reconnaissance
- attack.t1083
- attack.t1595.002
- owasp.a01
- owasp.a05
falsepositives:
- Web crawlers and search engine bots
- Broken links from external sites
