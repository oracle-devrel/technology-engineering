title: Web Application Brute Force Login Attempt
id: a1010010-owasp-a07-bruteforce-001
status: stable
version: 1
description: Detects repeated failed login attempts via HTTP 401/403 responses to authentication endpoints. Indicates brute force or credential stuffing attacks. OWASP A07:2021 Identification and Authentication Failures.
logsource:
  product: oci
  service: loadbalancer
detection:
  selection:
    request_url|contains:
    - /login
    - /signin
    - /authenticate
    - /auth
    - /api/login
    - /api/auth
    - /token
    - /oauth
    - /portal/login
    - /vulnerable/login
  failure_codes:
    response_code:
    - "401"
    - "403"
  condition: selection and failure_codes
level: medium
tags:
- attack.credential_access
- attack.t1110.001
- attack.t1110.003
- owasp.a07
falsepositives:
- Users with expired passwords
- Misconfigured service accounts
