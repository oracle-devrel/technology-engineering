title: WAF SQL Injection Attack Allowed Through
id: a1010002-owasp-a03-sqli-allow-001
status: stable
version: 1
description: Detects SQL injection attempts that were ALLOWED through WAF (detection-only mode or rule bypass). Critical alert indicating potential successful exploitation.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: DETECT
  sqli_patterns:
    request_url|contains:
    - " OR 1=1"
    - " or 1=1"
    - "1=1"
    # Apostrophe-prefixed boolean payloads (admin' OR 1=1--)
    - "' OR 1=1"
    - "' or 1=1"
    - "' OR '1'='1"
    - "' or '1'='1"
    - "' AND 1=1"
    - "%27%20OR%201%3D1"
    - "%27+OR+1%3D1"
    - UNION SELECT
    - union select
    - UNION%20SELECT
    - DROP TABLE
    - drop table
    - "--"
    - INFORMATION_SCHEMA
    - information_schema
    - SLEEP(
    - BENCHMARK(
    - EXTRACTVALUE(
  condition: selection and sqli_patterns
level: critical
tags:
- attack.initial_access
- attack.t1190
- attack.t1059.007
- owasp.a03
falsepositives:
- WAF in detection-only mode during initial tuning
