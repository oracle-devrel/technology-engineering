title: API Endpoint Unauthorized Access Attempts
id: a1010023-owasp-a01-apiabuse-001
status: stable
version: 1
description: Detects unauthorized access attempts to API endpoints (401/403 responses). May indicate API key brute force, token manipulation, or broken access control. OWASP A01:2021 Broken Access Control.
logsource:
  product: oci
  service: loadbalancer
detection:
  selection:
    request_url|contains:
    - /api/
    - /v1/
    - /v2/
    - /graphql
    - /rest/
  failure:
    response_code:
    - "401"
    - "403"
  condition: selection and failure
level: medium
tags:
- attack.initial_access
- attack.t1190
- attack.t1078
- owasp.a01
falsepositives:
- Expired API tokens being refreshed
- Misconfigured API clients
