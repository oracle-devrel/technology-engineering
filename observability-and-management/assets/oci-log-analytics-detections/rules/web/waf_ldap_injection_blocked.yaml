title: WAF LDAP Injection Attack Blocked
id: a1010016-owasp-a03-ldapi-block-001
status: stable
version: 1
description: Detects LDAP injection attempts blocked by WAF. Attackers manipulate LDAP queries to bypass authentication or extract directory information. OWASP A03:2021 Injection.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  ldap_patterns:
    request_url|contains:
    - ")(cn="
    - ")(uid="
    - ")(mail="
    - ")(|(cn="
    - "*)(&"
    - "*)(objectClass="
    - ")(userPassword="
    - "*))(|"
    - "admin)(&)"
    - "x])(objectClass"
  condition: selection and ldap_patterns
level: high
tags:
- attack.initial_access
- attack.t1190
- owasp.a03
falsepositives:
- LDAP-based search functionality with special characters
