title: Unusually Large HTTP Response (Data Exfiltration)
id: a1010014-owasp-a01-exfil-001
status: stable
version: 1
description: Detects unusually large HTTP responses that may indicate successful data exfiltration (database dumps, bulk user data extraction). OWASP A01:2021 Broken Access Control.
logsource:
  product: oci
  service: loadbalancer
detection:
  selection:
    response_code: "200"
  large_paths:
    request_url|contains:
    - /api/
    - /export
    - /download
    - /dump
    - /backup
    - /users
    - /data
    - /report
    - /vulnerable
  condition: selection and large_paths
level: medium
tags:
- attack.exfiltration
- attack.t1041
- attack.t1048
- owasp.a01
falsepositives:
- Legitimate large file downloads
- Report generation endpoints
