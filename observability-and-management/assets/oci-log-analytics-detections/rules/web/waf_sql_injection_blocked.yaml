title: WAF SQL Injection Attack Blocked
id: a1010001-owasp-a03-sqli-block-001
status: stable
version: 1
description: Detects SQL injection attempts blocked by OCI WAF. Indicates active exploitation of OWASP A03:2021 Injection vulnerabilities against the web application.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  sqli_patterns:
    request_url|contains:
    - " OR 1=1"
    - " or 1=1"
    - "1=1"
    # Apostrophe-prefixed boolean payloads (admin' OR 1=1--)
    - "' OR 1=1"
    - "' or 1=1"
    - "' OR '1'='1"
    - "' or '1'='1"
    - "' AND 1=1"
    - "%27%20OR%201%3D1"
    - "%27+OR+1%3D1"
    - UNION SELECT
    - union select
    - UNION%20SELECT
    - "DROP TABLE"
    - "drop table"
    - "--"
    - "/*"
    - "ORDER BY 1"
    - "order by 1"
    - INFORMATION_SCHEMA
    - information_schema
    - WAITFOR DELAY
    - BENCHMARK(
    - SLEEP(
    - EXTRACTVALUE(
    - UPDATEXML(
  # OWASP CRS rule keys 941 (XSS) and 942 (SQLi) — fire even when the URL
  # was already URL-encoded past pattern recognition. Drop these and the
  # rule misses every payload the WAF caught structurally instead of
  # textually.
  sqli_rules:
    rule_key|contains:
    - "941"
    - "942"
  condition: selection and (sqli_patterns or sqli_rules)
level: high
tags:
- attack.initial_access
- attack.t1190
- attack.t1059.007
- owasp.a03
falsepositives:
- Legitimate queries containing SQL keywords in search fields
- Security scanning tools during authorized testing
do_not_overwrite: true  # curated demo-tuned query — see scripts/test_query_audit.py
