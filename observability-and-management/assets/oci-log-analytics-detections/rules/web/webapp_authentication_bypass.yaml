title: Web Application Authentication Bypass
id: a1010019-owasp-a07-authbypass-001
status: stable
version: 1
description: Detects authentication bypass attempts including JWT manipulation, session fixation, and forced browsing to protected endpoints. OWASP A07:2021 Identification and Authentication Failures.
logsource:
  product: oci
  service: webapp
detection:
  selection_type:
    attack_type:
    - authentication_bypass
    - jwt_manipulation
    - session_fixation
    - forced_browsing
  selection_owasp:
    owasp_category|contains: Authentication
  condition: selection_type or selection_owasp
level: critical
tags:
- attack.initial_access
- attack.t1078
- attack.t1550
- owasp.a07
falsepositives:
- Security testing tools
