title: WAF XML External Entity Attack Blocked
id: a1010007-owasp-a05-xxe-block-001
status: stable
version: 1
description: Detects XXE (XML External Entity) injection attempts blocked by WAF. Attackers exploit XML parsers to read files, perform SSRF, or execute denial of service.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  xxe_patterns:
    request_url|contains:
    - "<!DOCTYPE"
    - "<!ENTITY"
    - "SYSTEM "
    - "file:///"
    - "expect://"
    - "php://filter"
    - "data://text"
  xxe_body:
    request_body|contains:
    - "<!DOCTYPE"
    - "<!ENTITY"
    - "SYSTEM "
    - "file:///"
    - "php://filter"
  xxe_content:
    content_type|contains:
    - "text/xml"
    - "application/xml"
  condition: selection and (xxe_patterns or (xxe_body and xxe_content))
level: high
tags:
- attack.initial_access
- attack.t1190
- owasp.a05
falsepositives:
- Legitimate XML-based API endpoints
- SOAP web services
