title: WAF Path Traversal Attack Blocked
id: a1010004-owasp-a01-pathtraversal-001
status: stable
version: 1
description: Detects directory traversal (path traversal) attacks blocked by WAF. Attackers attempt to access files outside the web root using ../ sequences. OWASP A01:2021 Broken Access Control.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  traversal_patterns:
    request_url|contains:
    - "../"
    - "..%2f"
    - "..%5c"
    - "..%252f"
    - "%2e%2e/"
    - "%2e%2e%2f"
    - "..../"
    - "/etc/passwd"
    - "/etc/shadow"
    - "/proc/self"
    - "/windows/system32"
    - "boot.ini"
    - "win.ini"
  traversal_rules:
    rule_key|contains:
    - "930"
  condition: selection and (traversal_patterns or traversal_rules)
level: high
tags:
- attack.initial_access
- attack.t1083
- attack.t1190
- owasp.a01
falsepositives:
- Misconfigured web applications with legitimate relative paths
