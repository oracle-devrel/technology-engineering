title: WAF Protocol Attack Blocked
id: a1010025-owasp-a05-protocol-001
status: stable
version: 1
description: Detects HTTP protocol violation attacks blocked by WAF (request smuggling, header injection, HTTP splitting). OWASP A05:2021 Security Misconfiguration.
logsource:
  product: oci
  service: waf
detection:
  selection:
    waf_action: BLOCK
  protocol_rules:
    rule_key|contains:
    - "920"
    - "921"
  protocol_patterns:
    request_headers|contains:
    - "%0d%0a"
    - "%0D%0A"
    - "Transfer-Encoding: chunked"
    - "Content-Length: 0"
  condition: selection and (protocol_rules or protocol_patterns)
level: high
tags:
- attack.initial_access
- attack.t1190
- owasp.a05
falsepositives:
- Legitimate HTTP clients with unusual header formatting
