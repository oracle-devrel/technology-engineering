title: Insecure Deserialization Attack Detected
id: a1010020-owasp-a08-deserial-001
status: stable
version: 1
description: Detects insecure deserialization attacks where malicious serialized objects are sent to achieve remote code execution. OWASP A08:2021 Software and Data Integrity Failures.
logsource:
  product: oci
  service: webapp
detection:
  selection_type:
    attack_type:
    - deserialization
    - insecure_deserialization
    - object_injection
  selection_owasp:
    owasp_category|contains: Integrity
  selection_patterns:
    request_body|contains:
    - "rO0AB"
    - "java.lang.Runtime"
    - "java.lang.ProcessBuilder"
    - "ysoserial"
    - "ObjectInputStream"
    - "__reduce__"
    - "pickle.loads"
    - "yaml.load"
    - "unserialize("
    - "O:4:\"User\""
  condition: selection_type or selection_owasp or selection_patterns
level: critical
tags:
- attack.execution
- attack.t1059
- attack.t1190
- owasp.a08
falsepositives:
- Legitimate serialized data in API payloads
