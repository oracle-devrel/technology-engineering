title: Caldera - Data Collection from Network Shared Drive (Linux)
id: 10d80508-d684-4070-a0ea-ee78fab09c50
status: experimental
description: >
  Detects collection of data from mounted network shares on Linux hosts.
  Caldera T1039 emulation accesses SMB/CIFS and NFS mounts, lists their contents,
  and copies files to a staging location. Patterns include smbclient interactive
  commands, direct reads from /mnt share paths, and cifs-utils access.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_smbclient:
    message|contains:
      - 'smbclient //'
      - 'smbclient -L'
      - 'smbclient -U'
  sel_mount_access:
    message|contains:
      - 'mount -t cifs'
      - 'mount -t nfs'
      - 'mount -t smbfs'
      - 'mount.cifs'
  sel_share_path_read:
    message|contains:
      - 'ls /mnt/'
      - 'cp /mnt/'
      - 'find /mnt/'
      - 'find /media/'
      - 'rsync /mnt/'
  sel_smb_get:
    message|contains:
      - 'smb: \\> get'
      - 'smb: \\> mget'
      - 'smb: \\> lcd'
  condition: sel_smbclient or sel_mount_access or sel_share_path_read or sel_smb_get
level: medium
tags:
  - attack.collection
  - attack.t1039
falsepositives:
  - Authorized backup agents reading from network shares
  - File servers serving content from mounted volumes
  - Administrators managing share contents
version: 1
