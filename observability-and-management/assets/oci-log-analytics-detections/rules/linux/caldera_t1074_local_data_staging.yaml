title: Caldera - Local Data Staging in Writable Directories (Linux)
id: 8a7bfa9d-2839-45a0-b9af-9a13f300a2e4
status: experimental
description: >
  Detects data staging in world-writable directories prior to exfiltration.
  Caldera T1074 emulation copies or moves sensitive files into /tmp, /dev/shm,
  or /var/tmp before transmitting them. Detection is based on bulk copy or move
  operations targeting these staging paths from sensitive source directories.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_cp_to_tmp:
    message|contains:
      - 'cp -r /etc'
      - 'cp -r /home'
      - 'cp -r /root'
      - 'cp -r /var/www'
      - 'cp /etc/passwd /tmp'
      - 'cp /etc/shadow /tmp'
  sel_mv_to_tmp:
    message|contains:
      - 'mv /etc/'
      - 'mv /home/'
      - 'mv /root/'
  sel_staging_dirs:
    message|contains:
      - '/tmp/staging'
      - '/tmp/loot'
      - '/tmp/data'
      - '/dev/shm/data'
      - '/dev/shm/staging'
      - '/var/tmp/staging'
  sel_find_and_stage:
    message|contains:
      - 'find / -name'
      - 'find /home -name'
      - 'find /etc -name'
  condition: sel_cp_to_tmp or sel_mv_to_tmp or sel_staging_dirs or sel_find_and_stage
level: medium
tags:
  - attack.collection
  - attack.t1074
  - attack.t1074.001
falsepositives:
  - System backup scripts
  - Deployment automation copying configuration files
version: 1
