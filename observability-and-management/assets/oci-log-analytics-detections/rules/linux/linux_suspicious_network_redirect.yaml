title: Linux Suspicious Network Traffic Redirect
id: d1a2b3c4-2006-4000-8000-000000000006
status: stable
description: Detects iptables or nftables modifications that redirect network traffic, which could indicate man-in-the-middle
  attacks or traffic interception.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - iptables -t nat -A PREROUTING
    - iptables -t nat -A OUTPUT
    - iptables -A FORWARD
    - nft add rule.*dnat
    - nft add rule.*redirect
  condition: selection
level: high
tags:
- attack.collection
- attack.t1557
version: 1
falsepositives:
- Legitimate network debugging
