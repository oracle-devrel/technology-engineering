title: Linux Archive Data Collected for Exfiltration
id: a1b2c3d4-6012-4000-8000-000000000012
status: stable
description: 'Detects creation of compressed archives from sensitive directories.
  Attackers archive collected data (credentials, source code, configs) before exfiltrating
  to reduce transfer size and avoid detection.

  '
author: SOC Detection Team
date: 2026/02/11
logsource:
  product: linux
  service: syslog
detection:
  sel_tar_sensitive:
    message|contains:
    - tar -czf
    - tar czf
    - tar -cjf
    - tar cjf
  sel_zip_sensitive:
    message|contains:
    - zip -r /tmp
    - zip -r /dev/shm
    - zip -r /var/tmp
  sel_targets:
    message|contains:
    - /etc/
    - /home/
    - /root/
    - /var/www/
    - /opt/
  condition: (sel_tar_sensitive or sel_zip_sensitive) and sel_targets
level: high
tags:
- attack.collection
- attack.t1560.001
- attack.exfiltration
falsepositives:
- System backup scripts
- Application deployment archives
version: 1
do_not_overwrite: true  # curated demo-tuned query — see scripts/test_query_audit.py
