title: Linux Network Service Scanning
id: a1b2c3d4-6001-4000-8000-000000000001
status: stable
description: 'Detects network scanning tools (nmap, masscan, zmap) used for host and
  service discovery. Attackers use these tools during the discovery phase to map network
  topology and identify vulnerable services.

  '
author: SOC Detection Team
date: 2026/02/11
logsource:
  product: linux
  service: syslog
detection:
  sel_nmap:
    process_name|endswith: nmap
  sel_masscan:
    process_name|endswith: masscan
  sel_zmap:
    process_name|endswith: zmap
  sel_cmdline:
    message|contains:
    - nmap -s
    - nmap -p
    - masscan -p
    - zmap -p
  condition: sel_nmap or sel_masscan or sel_zmap or sel_cmdline
level: high
tags:
- attack.discovery
- attack.t1046
falsepositives:
- Authorized vulnerability scanning
- Network monitoring tools
version: 1
