title: Linux SSH Tunneling Detected
id: e1f2a3b4-4009-4000-8000-000000000009
status: stable
description: Detects SSH tunneling and port forwarding commands used for pivoting,
  data exfiltration, or bypassing network security controls.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - ssh -L
    - ssh -R
    - ssh -D
    - ssh -N -f
    - autossh
  condition: selection
level: high
tags:
- attack.command_and_control
- attack.t1572
falsepositives:
- Legitimate development tunnels
- Bastion host port forwarding
version: 1
