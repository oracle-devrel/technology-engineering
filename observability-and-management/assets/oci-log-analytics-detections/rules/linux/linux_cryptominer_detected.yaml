title: Linux Cryptominer Activity Detected
id: f1e2d3c4-5005-4000-8000-000000000005
status: stable
description: Detects execution of known cryptomining software or command patterns
  associated with unauthorized cryptocurrency mining on compromised hosts.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - xmrig
    - minerd
    - cpuminer
    - stratum+tcp
    - stratum+ssl
    - cryptonight
    - --donate-level
  condition: selection
level: high
tags:
- attack.impact
- attack.t1496
falsepositives:
- Authorized mining operations
- Blockchain development testing
version: 1
