title: Linux External Remote Service Abuse
id: a1b2c3d4-6008-4000-8000-000000000008
status: stable
description: 'Detects suspicious use of external remote services (SSH, VPN, RDP via
  xfreerdp) from unusual or unauthorized sources. Attackers abuse external-facing
  remote services with stolen or default credentials to gain initial access.

  '
author: SOC Detection Team
date: 2026/02/11
logsource:
  product: linux
  service: auth
detection:
  sel_ssh_accept:
    process_name: sshd
    message|contains: Accepted
  sel_vpn:
    message|contains:
    - openvpn
    - wireguard
    - strongswan
  sel_rdp:
    message|contains:
    - xfreerdp
    - rdesktop
  condition: sel_ssh_accept or sel_vpn or sel_rdp
level: low
tags:
- attack.initial_access
- attack.t1133
falsepositives:
- Legitimate remote access
- VPN connections from authorized users
version: 1
