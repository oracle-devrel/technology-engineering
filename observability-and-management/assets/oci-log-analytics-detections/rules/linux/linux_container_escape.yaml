title: Linux Container Escape Attempt
id: d1a2b3c4-2001-4000-8000-000000000001
status: stable
description: Detects patterns indicating container escape attempts including access to Docker socket, cgroup manipulation,
  or nsenter usage from within containers.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - nsenter -t 1 -m -u -i -n -p
    - /var/run/docker.sock
    - mount -t cgroup
    - release_agent
    - core_pattern
  condition: selection
level: critical
tags:
- attack.privilege_escalation
- attack.t1611
version: 1
falsepositives:
- Legitimate container debugging operations
