title: Linux Hidden File or Directory Creation in Suspicious Location
id: f1e2d3c4-5010-4000-8000-000000000010
status: stable
description: Detects creation of hidden files or directories (starting with dot) in
  world-writable or suspicious locations commonly used by attackers to stash tools
  and payloads.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - /tmp/.
    - /var/tmp/.
    - /dev/shm/.
    - /run/lock/.
  condition: selection
level: medium
tags:
- attack.defense_evasion
- attack.t1564.001
falsepositives:
- Applications creating hidden temporary configuration files
version: 1
