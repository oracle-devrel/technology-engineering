title: Caldera - Lateral Tool Transfer via scp/rsync (Linux)
id: 0fb4827e-92fd-45af-94c7-4e6c1c16b6e7
status: experimental
description: >
  Detects transfer of attacker tools or payloads to other hosts via scp, rsync,
  or curl. Caldera T1570 emulation copies implants from the initial foothold to
  lateral targets over SSH (scp) or HTTP (curl download-and-execute). Detection
  focuses on transfers from /tmp or /dev/shm to remote hosts.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_scp_from_staging:
    message|contains:
      - 'scp /tmp/'
      - 'scp /dev/shm/'
      - 'scp /var/tmp/'
  sel_scp_to_remote:
    message|contains:
      - 'scp -i '
      - 'scp -r '
      - 'scp -P '
  sel_rsync_to_remote:
    message|contains:
      - 'rsync -avz'
      - 'rsync -e ssh'
      - 'rsync --rsh=ssh'
  sel_curl_exec:
    message|contains:
      - 'curl -s | bash'
      - 'curl -sL | bash'
      - 'wget -q -O- |'
      - 'wget -q | bash'
  condition: sel_scp_from_staging or (sel_scp_to_remote and sel_scp_from_staging) or sel_rsync_to_remote or sel_curl_exec
level: high
tags:
  - attack.lateral_movement
  - attack.t1570
falsepositives:
  - Authorized configuration management file distribution
  - DevOps deployment pipelines using scp/rsync
version: 1
