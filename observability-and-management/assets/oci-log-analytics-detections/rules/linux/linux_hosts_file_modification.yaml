title: Linux Hosts File Modification
id: f1e2d3c4-5002-4000-8000-000000000002
status: stable
description: Detects modification of /etc/hosts or /etc/resolv.conf. Attackers modify
  these to redirect traffic, bypass security controls, or perform DNS hijacking.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - /etc/hosts
    - /etc/resolv.conf
  condition: selection
level: medium
tags:
- attack.defense_evasion
- attack.t1565.001
falsepositives:
- Network configuration management
- Container orchestration updating DNS resolution
version: 1
