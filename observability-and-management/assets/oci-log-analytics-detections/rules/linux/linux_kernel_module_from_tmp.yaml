title: Linux Kernel Module Loaded from Temp Directory
id: d1a2b3c4-2003-4000-8000-000000000003
status: stable
description: Detects loading of kernel modules from temporary directories (/tmp, /dev/shm, /var/tmp), a strong indicator of
  rootkit installation.
logsource:
  product: linux
  service: audit
detection:
  selection:
    process_name: insmod
    message|contains:
    - /tmp/
    - /dev/shm/
    - /var/tmp/
  condition: selection
level: critical
tags:
- attack.persistence
- attack.t1547.006
version: 1
falsepositives:
- Authorized kernel module management
- System updates
