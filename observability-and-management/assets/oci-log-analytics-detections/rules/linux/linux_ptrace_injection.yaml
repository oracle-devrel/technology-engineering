title: Linux Process Injection via Ptrace
id: d1a2b3c4-2005-4000-8000-000000000005
status: stable
description: Detects use of ptrace for process injection or debugging, which can be used to inject malicious code into running
  processes.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - ptrace(PTRACE_ATTACH
    - PTRACE_POKETEXT
    - PTRACE_POKEDATA
    - strace -p
    - gdb --pid
    - gdb -p
  condition: selection
level: high
tags:
- attack.defense_evasion
- attack.t1055.008
version: 1
falsepositives:
- Legitimate debugging by developers
- Authorized security testing
