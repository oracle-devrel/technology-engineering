title: Caldera - SMB Lateral Movement via Impacket from Linux
id: 8684eabc-c162-4b68-b8d3-cbb19b154e11
status: experimental
description: >
  Detects use of Impacket tools (psexec.py, smbexec.py, wmiexec.py) from Linux
  hosts for lateral movement to Windows targets. Caldera T1021.002 emulation
  leverages Impacket to authenticate over SMB and execute commands on Windows
  systems within the GOAD AD lab network.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_impacket_exec:
    message|contains:
      - 'psexec.py'
      - 'smbexec.py'
      - 'wmiexec.py'
      - 'atexec.py'
  sel_smb_tool:
    message|contains:
      - 'impacket'
      - 'smbclient.py'
      - 'secretsdump.py'
  sel_target_host:
    message|contains:
      - '//'
      - '@'
  sel_exec_flags:
    message|contains:
      - '-target-ip'
      - '-dc-ip'
      - 'SMBDomain'
  condition: sel_impacket_exec or sel_smb_tool or sel_exec_flags
level: high
tags:
  - attack.lateral_movement
  - attack.t1021.002
falsepositives:
  - Authorized penetration testing with Impacket
  - AD administrators using Impacket for administrative tasks
version: 1
