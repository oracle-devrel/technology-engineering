title: Linux SSH Authorized Keys Modified
id: 18c9d0e1-cdef-0123-4567-890123456078
status: stable
description: Detects modifications to SSH authorized_keys files, which may indicate backdoor access being established.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains: authorized_keys
  condition: selection
level: high
tags:
- attack.persistence
- attack.t1098.004
version: 1
falsepositives:
- Authorized remote administration
- Automated SSH-based deployments
