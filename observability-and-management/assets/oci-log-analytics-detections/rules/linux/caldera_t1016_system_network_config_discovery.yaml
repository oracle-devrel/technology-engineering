title: Caldera - System Network Configuration Discovery (Linux)
id: 9b43077e-df83-4b5a-b672-ab8657b2db86
status: experimental
description: >
  Detects Linux commands used to enumerate network interface configuration.
  Caldera T1016 emulation runs ip addr/route/link, ifconfig, route -n, and arp
  to map network topology and identify active interfaces after initial access.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_ip_commands:
    message|contains:
      - 'ip addr'
      - 'ip route'
      - 'ip link'
      - 'ip neigh'
      - 'ip -4 addr'
      - 'ip -6 addr'
  sel_ifconfig:
    message|contains:
      - 'ifconfig -a'
      - 'ifconfig eth'
      - 'ifconfig ens'
      - 'ifconfig lo'
  sel_route:
    message|contains:
      - 'route -n'
      - 'route -e'
      - 'netstat -rn'
      - 'netstat -r '
  sel_arp:
    message|contains:
      - 'arp -a'
      - 'arp -n'
      - 'cat /proc/net/arp'
  condition: sel_ip_commands or sel_ifconfig or sel_route or sel_arp
level: low
tags:
  - attack.discovery
  - attack.t1016
falsepositives:
  - System monitoring and inventory tools
  - Network configuration management scripts
  - Administrators diagnosing connectivity issues
version: 1
