title: Linux DNS Tunneling Detected
id: f1e2d3c4-5001-4000-8000-000000000001
status: stable
description: Detects execution of DNS tunneling tools such as iodine, dns2tcp, or
  dnscat2 used to exfiltrate data or establish covert C2 channels over DNS.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains:
    - iodine
    - dns2tcp
    - dnscat
    - dnscrypt-proxy
    - dnsmasq --server
  condition: selection
level: high
tags:
- attack.command_and_control
- attack.t1071.004
falsepositives:
- Legitimate DNS privacy tools (dnscrypt-proxy)
- Network testing by administrators
version: 1
