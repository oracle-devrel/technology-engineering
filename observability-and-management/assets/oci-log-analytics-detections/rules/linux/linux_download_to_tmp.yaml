title: Linux Suspicious Download to /tmp
id: e1f2a3b4-4010-4000-8000-000000000010
status: stable
description: Detects file downloads to /tmp directory using common tools. Attackers
  frequently stage payloads in /tmp as it is world-writable.
logsource:
  product: linux
  service: audit
detection:
  sel_tool:
    process_name:
    - wget
    - curl
  sel_path:
    message|contains:
    - /tmp/
    - -o /tmp
    - -O /tmp
  condition: sel_tool and sel_path
level: high
tags:
- attack.command_and_control
- attack.t1105
falsepositives:
- Package managers downloading to temporary locations
- Legitimate admin scripts
version: 1
