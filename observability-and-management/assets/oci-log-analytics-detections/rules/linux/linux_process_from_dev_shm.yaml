title: Linux Process Execution from /dev/shm
id: e1f2a3b4-4011-4000-8000-000000000011
status: stable
description: Detects execution of processes from /dev/shm (shared memory filesystem).
  This in-memory filesystem is frequently used by attackers to stage and execute payloads
  without touching disk.
logsource:
  product: linux
  service: audit
detection:
  selection:
    message|contains: /dev/shm/
  condition: selection
level: critical
tags:
- attack.execution
- attack.t1059
falsepositives:
- Some legitimate applications use /dev/shm for inter-process communication
version: 1
