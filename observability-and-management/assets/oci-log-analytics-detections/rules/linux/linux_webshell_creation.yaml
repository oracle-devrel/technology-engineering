title: Linux Web Shell File Creation
id: f1e2d3c4-5004-4000-8000-000000000004
status: stable
description: Detects file creation or modification in common web directories that
  may indicate web shell deployment for persistent remote access.
logsource:
  product: linux
  service: audit
detection:
  sel_path:
    message|contains:
    - /var/www/html/
    - /var/www/cgi-bin/
    - /usr/share/nginx/html/
    - /opt/lampp/htdocs/
    - /srv/http/
  sel_ext:
    message|contains:
    - .php
    - .jsp
    - .aspx
    - .sh
  condition: sel_path and sel_ext
level: critical
tags:
- attack.persistence
- attack.t1505.003
falsepositives:
- Legitimate web application deployments
- CMS plugin installations
version: 1
