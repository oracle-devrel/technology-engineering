title: Caldera - System Owner and Identity Discovery via id/whoami (Linux)
id: a26c3909-5e36-4ba7-909d-fe7fb683b1f8
status: experimental
description: >
  Detects identity enumeration commands used by Caldera T1033 emulation on Linux.
  Adversaries run id, whoami, logname, and finger immediately after access to
  determine their effective privilege level and active username. This rule covers
  the quick identity check commands not included in the existing T1033 rule.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_id:
    message|contains:
      - 'id -u'
      - 'id -g'
      - 'id -G'
      - 'id -Z'
  sel_whoami:
    message|contains:
      - 'whoami'
      - 'logname'
  sel_user_context:
    message|contains:
      - 'echo $USER'
      - 'echo $LOGNAME'
      - 'echo $UID'
      - 'cat /etc/passwd'
  condition: sel_id or sel_whoami or sel_user_context
level: low
tags:
  - attack.discovery
  - attack.t1033
falsepositives:
  - User login scripts checking privilege level
  - Automation scripts verifying run-as context
version: 1
