title: Caldera - System Information Discovery via Native Linux Commands
id: de9ed5f4-092c-4e8b-96a7-bbb6f958549e
status: experimental
description: >
  Detects use of native Linux commands to profile system hardware, OS version,
  and kernel details. Caldera T1082 emulation runs uname, hostnamectl, lscpu,
  dmidecode, and /etc/os-release reads to fingerprint the host before exploitation.
  This rule complements linpeas/linenum detection by covering non-script-based recon.
author: SOC Detection Engineering
date: 2026/06/11
logsource:
  product: linux
  service: syslog
detection:
  sel_os_info:
    message|contains:
      - 'uname -a'
      - 'uname -r'
      - 'uname -m'
      - 'cat /etc/os-release'
      - 'cat /proc/version'
      - 'lsb_release -a'
      - 'hostnamectl'
  sel_hw_info:
    message|contains:
      - 'lscpu'
      - 'lshw'
      - 'dmidecode'
      - 'cat /proc/cpuinfo'
      - 'cat /proc/meminfo'
      - 'free -m'
  sel_disk_info:
    message|contains:
      - 'lsblk'
      - 'df -h'
      - 'df -a'
      - 'fdisk -l'
  condition: sel_os_info or sel_hw_info or sel_disk_info
level: low
tags:
  - attack.discovery
  - attack.t1082
falsepositives:
  - Configuration management tools (Ansible, Puppet, Chef)
  - System inventory agents
  - Support engineers collecting diagnostic information
version: 1
