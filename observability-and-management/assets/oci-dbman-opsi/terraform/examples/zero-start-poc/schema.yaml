title: OCI DB Management and Ops Insights Enablement
description: Resource Manager stack for enabling OCI Database Management and Operations Insights prerequisites.
schemaVersion: 1.1.0
version: "20260603"
locale: en

variableGroups:
  - title: Required OCI Scope
    variables:
      - tenancy_ocid
      - compartment_ocid
      - region
  - title: Network
    variables:
      - create_test_network
      - vcn_ocid
      - subnet_ocid
      - test_vcn_cidr
      - test_subnet_cidr
  - title: Optional Targets
    variables:
      - targets
      - ssh_public_keys

variables:
  tenancy_ocid:
    title: Tenancy OCID
    type: oci_tenancy
    required: true

  compartment_ocid:
    title: Target Compartment
    type: oci_compartment
    required: true

  region:
    title: Region
    type: oci_region
    required: true

  create_test_network:
    title: Create Workshop Network
    type: boolean
    default: true

  vcn_ocid:
    title: Existing VCN OCID
    type: oci_vcn
    required: false
    dependsOn:
      create_test_network: false

  subnet_ocid:
    title: Existing Private Subnet OCID
    type: oci_subnet
    required: false
    dependsOn:
      create_test_network: false

  test_vcn_cidr:
    title: Workshop VCN CIDR
    type: string
    default: 10.44.0.0/16

  test_subnet_cidr:
    title: Workshop Private Subnet CIDR
    type: string
    default: 10.44.10.0/24

  targets:
    title: Target Descriptor List
    type: text
    multiline: true
    required: false
    description: JSON target descriptors generated by dbman-opsi. Keep credentials in Vault or environment variables, not in this field.

  ssh_public_keys:
    title: SSH Public Keys
    type: array
    items:
      type: string
    required: false

