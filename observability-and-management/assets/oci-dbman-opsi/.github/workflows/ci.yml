# dbman-opsi — Continuous Integration
#
# Four gating jobs:
#   test        — pytest across Python 3.11/3.12/3.13 with 80 % coverage gate
#   deps        — pip-audit dependency vulnerability scan
#   security    — bandit static-analysis (medium+ severity)
#   secret-scan — gitleaks full-history + custom OCI OCID/token rules
#
# Triggered on every push and every PR, regardless of branch.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let all matrix legs finish even if one fails
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"          # cache ~/.cache/pip keyed on requirements hash

      - name: Install package + dev extras
        # installs pytest, pytest-cov, and the dbman_opsi package in editable mode
        run: pip install -e '.[dev]'

      - name: Run pytest
        # Coverage gate (--cov-fail-under=80) is enforced by pyproject.toml addopts;
        # no need to duplicate flags here.
        run: pytest

  # ─── 2. Dependency CVE scan ──────────────────────────────────────────────────
  deps:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit .

  # ─── 3. Security scan ────────────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        # bandit is not a dev dependency — install it directly in this job.
        run: pip install bandit

      - name: Run bandit (medium+ severity, low+ confidence)
        # -ll  → report only Medium severity or higher (Low issues are noise here)
        #
        #   B608 (hardcoded_sql_expressions) is skipped project-wide: every hit is
        #   in db_scripts.py, an Oracle SQL*Plus script generator, not a Python
        #   DB-API call. The interpolated values are DDL identifiers (usernames,
        #   container names) that cannot be bind-parameterised; the Oracle-side
        #   guard is dbms_assert.simple_sql_name(). B608 is structurally
        #   inapplicable to a SQL-emitting tool, so a blanket skip is correct here.
        #
        #   B108 (hardcoded_tmp_directory) is NOT skipped — it stays active to
        #   catch real insecure local-tempfile use. Its one current hit (the
        #   `remote_dir="/tmp"` default in bastion_exec.py, a remote SSH path) is
        #   suppressed inline with `# nosec B108` and a justification.
        run: bandit -r src/ -ll --skip B608

  # ─── 4. Secret scan ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 gives gitleaks access to all commits, not just HEAD,
          # so it can detect secrets that were introduced and later "removed".
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for private repositories.
          # This toolkit is designed for public repos; no license key is needed.
          # If the repo is private, add GITLEAKS_LICENSE to repository secrets:
          #   https://gitleaks.io/products.html
