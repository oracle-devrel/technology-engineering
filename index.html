<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Engineering Repository Assistant</title>
<style>
body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f5f7fa}
.header{position:sticky;top:0;background:white;padding:12px;border-bottom:1px solid #ddd;z-index:100}
input[type=text]{width:60%;padding:10px}
button{padding:10px 14px}
.container{display:flex;height:calc(100vh - 80px)}
.sidebar{width:28%;overflow:auto;background:#fff;border-right:1px solid #ddd;padding:10px}
.main{flex:1;display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:16px}
.msg{background:white;padding:10px;border-radius:8px;margin-bottom:10px}
.tags span{display:inline-block;background:#e8eefc;margin:3px;padding:4px 8px;border-radius:10px;cursor:pointer}
.results{background:#fff;padding:10px;border-top:1px solid #ddd}
.small{color:#666;font-size:12px}
</style>
</head>
<body>
    This is a test
</body>
</html>
