  <text x="483" y="488" text-anchor="middle" class="note">WO</text>

  <rect x="1058" y="300" width="118" height="214" class="box-green"/>
  <text x="1117" y="322" text-anchor="middle" class="section-title">Migration</text>
  <text x="1117" y="340" text-anchor="middle" class="section-title">Services</text>
  <rect x="1080" y="346" width="74" height="42" class="box"/>
  <text x="1117" y="372" text-anchor="middle" class="note">NE</text>
  <rect x="1080" y="404" width="74" height="42" class="box"/>
  <text x="1117" y="430" text-anchor="middle" class="note">IX</text>
  <rect x="1080" y="462" width="74" height="42" class="box"/>
  <text x="1117" y="488" text-anchor="middle" class="note">WO</text>

  <path class="line-blue" marker-end="url(#arrow-blue)" d="M542 367 L596 414"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M1004 414 L1058 367"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M542 425 L596 421"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M1004 421 L1058 425"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M542 483 L596 429"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M1004 429 L1058 483"/>

  <rect x="608" y="492" width="384" height="40" class="box"/>
  <text x="800" y="515" text-anchor="middle" class="label">WAN / FastConnect / IPSec VPN</text>

  <rect x="84" y="364" width="248" height="92" class="box"/>
  <text x="208" y="391" text-anchor="middle" class="section-title">vCenter / NSX / VDS</text>
  <text x="208" y="414" text-anchor="middle" class="small">Inventory, networks, migration source</text>
  <text x="208" y="435" text-anchor="middle" class="tiny">Manages source ESXi clusters</text>

  <rect x="1268" y="364" width="248" height="92" class="box"/>
  <text x="1392" y="391" text-anchor="middle" class="section-title">vCenter / NSX-T</text>
  <text x="1392" y="414" text-anchor="middle" class="small">Target SDDC inventory and overlays</text>
  <text x="1392" y="435" text-anchor="middle" class="tiny">Manages target ESXi clusters</text>

  <path class="line-dash" d="M208 456 L208 552"/>
  <path class="line-dash" d="M1392 456 L1392 552"/>

  <rect x="78" y="552" width="450" height="130" class="box"/>
  <text x="303" y="576" text-anchor="middle" class="section-title">Source ESXi Clusters and Workloads</text>
