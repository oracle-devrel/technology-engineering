<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Oracle Cloud VMware Solution HCX Migration Architecture</title>
  <desc id="desc">Updated HCX migration architecture showing on-premises VMware, Oracle Cloud VMware Solution, HCX Connector, HCX Cloud Manager, Service Mesh appliances, network connectivity, BYOL licensing, and HCX Disaster Recovery deprecation guidance.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .zone { fill: #eaf2ff; stroke: #5a7fb8; stroke-width: 2; }
      .zone-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .section-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .label { font: 500 14px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 12px Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 11px Arial, sans-serif; fill: #374151; }
      .note { font: 600 12px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .box-blue { fill: #0b5cab; stroke: #073b73; stroke-width: 1.5; rx: 8; }
      .box-blue-text { font: 700 14px Arial, sans-serif; fill: #ffffff; }
      .box-green { fill: #e9f8ef; stroke: #1f8f4f; stroke-width: 1.5; rx: 8; }
      .box-orange { fill: #fff4e5; stroke: #d97706; stroke-width: 1.5; rx: 8; }
      .box-red { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.5; rx: 8; }
      .cloud { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .line { stroke: #344054; stroke-width: 2; fill: none; }
      .line-dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
      .line-blue { stroke: #0b5cab; stroke-width: 3; fill: none; }
      .line-green { stroke: #15803d; stroke-width: 3; fill: none; }
      .line-orange { stroke: #d97706; stroke-width: 3; fill: none; }
      .line-red { stroke: #e11d48; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; }
      .vm { fill: #0f766e; }
      .host { fill: #f59e0b; stroke: #b45309; stroke-width: 1; }
      .host-base { fill: #dbeafe; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b5cab"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text x="800" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">VMware HCX Migration Architecture for Oracle Cloud VMware Solution</text>
  <text x="800" y="58" text-anchor="middle" class="small">OCVS bundle: HCX Cloud 4.11.2 / HCX Connector 4.10.2, OCVS BYOL licensing, migration-focused design</text>

  <rect x="35" y="96" width="560" height="640" class="zone"/>
  <text x="315" y="126" text-anchor="middle" class="zone-title">On-Premises VMware Data Center</text>
  <text x="315" y="148" text-anchor="middle" class="small">vCenter, NSX/VDS, ESXi clusters, workloads</text>

  <rect x="1005" y="96" width="560" height="640" class="zone"/>
  <text x="1285" y="126" text-anchor="middle" class="zone-title">OCI Region - Oracle Cloud VMware Solution</text>
  <text x="1285" y="148" text-anchor="middle" class="small">VMware SDDC on OCI Bare Metal, VCN/VLANs, NSX overlay</text>

  <path class="cloud" d="M758 142c-17-37 18-72 53-61 13-31 60-31 73 0 35-11 70 24 53 61 25 6 37 40 15 61-22 21-61 13-79 13h-143c-18 0-57 8-79-13-22-21-10-55 15-61z"/>
  <text x="800" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">HCX SaaS / Depot</text>
  <text x="800" y="245" text-anchor="middle" class="small">Activation, updates, fleet services</text>
  <text x="800" y="263" text-anchor="middle" class="tiny">connect.hcx.vmware.com / hybridity-depot.vmware.com</text>

  <rect x="205" y="180" width="190" height="84" class="box"/>
  <text x="300" y="207" text-anchor="middle" class="section-title">HCX Connector</text>
  <text x="300" y="230" text-anchor="middle" class="small">Customer-managed appliance</text>
  <text x="300" y="248" text-anchor="middle" class="tiny">Paired with HCX Cloud Manager</text>

  <rect x="1205" y="180" width="190" height="84" class="box"/>
  <text x="1300" y="207" text-anchor="middle" class="section-title">HCX Cloud Manager</text>
  <text x="1300" y="230" text-anchor="middle" class="small">Enabled in OCVS SDDC</text>
  <text x="1300" y="248" text-anchor="middle" class="tiny">Subject to BYOL entitlement</text>

  <path class="line-dash" marker-end="url(#arrow)" d="M300 180 L735 190"/>
  <path class="line-dash" marker-end="url(#arrow)" d="M1300 180 L865 190"/>

  <rect x="652" y="288" width="296" height="58" class="box-blue"/>
  <text x="800" y="313" text-anchor="middle" class="box-blue-text">Site Pairing</text>
  <text x="800" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#dbeafe">HCX Connector to HCX Cloud Manager</text>
  <path class="line" marker-end="url(#arrow)" d="M395 222 L652 317"/>
  <path class="line" marker-end="url(#arrow)" d="M948 317 L1205 222"/>

  <rect x="614" y="388" width="372" height="64" class="box-blue"/>
  <text x="800" y="414" text-anchor="middle" class="box-blue-text">Service Mesh</text>
  <text x="800" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#dbeafe">Deploys paired service appliances for migration traffic</text>

  <rect x="424" y="300" width="118" height="214" class="box-green"/>
  <text x="483" y="326" text-anchor="middle" class="section-title">HCX Services</text>
  <rect x="446" y="346" width="74" height="42" class="box"/>
  <text x="483" y="372" text-anchor="middle" class="note">NE</text>
  <rect x="446" y="404" width="74" height="42" class="box"/>
  <text x="483" y="430" text-anchor="middle" class="note">IX</text>
  <rect x="446" y="462" width="74" height="42" class="box"/>
  <text x="483" y="488" text-anchor="middle" class="note">WO</text>

  <rect x="1058" y="300" width="118" height="214" class="box-green"/>
  <text x="1117" y="326" text-anchor="middle" class="section-title">HCX Services</text>
  <rect x="1080" y="346" width="74" height="42" class="box"/>
  <text x="1117" y="372" text-anchor="middle" class="note">NE</text>
  <rect x="1080" y="404" width="74" height="42" class="box"/>
  <text x="1117" y="430" text-anchor="middle" class="note">IX</text>
  <rect x="1080" y="462" width="74" height="42" class="box"/>
  <text x="1117" y="488" text-anchor="middle" class="note">WO</text>

  <path class="line-blue" marker-end="url(#arrow-blue)" d="M542 367 L614 420"/>
  <path class="line-blue" marker-end="url(#arrow-blue)" d="M986 420 L1058 367"/>
  <path class="line-green" marker-end="url(#arrow-green)" d="M542 425 L614 420"/>
  <path class="line-green" marker-end="url(#arrow-green)" d="M986 420 L1058 425"/>
  <path class="line-orange" marker-end="url(#arrow-orange)" d="M542 483 L614 420"/>
  <path class="line-orange" marker-end="url(#arrow-orange)" d="M986 420 L1058 483"/>

  <rect x="608" y="490" width="384" height="40" class="box"/>
  <text x="800" y="515" text-anchor="middle" class="label">WAN / FastConnect / IPSec VPN / Internet underlay</text>
  <path class="line" marker-start="url(#arrow)" marker-end="url(#arrow)" d="M390 510 L608 510"/>
  <path class="line" marker-start="url(#arrow)" marker-end="url(#arrow)" d="M992 510 L1210 510"/>

  <rect x="84" y="318" width="248" height="92" class="box"/>
  <text x="208" y="345" text-anchor="middle" class="section-title">vCenter / NSX / VDS</text>
  <text x="208" y="368" text-anchor="middle" class="small">Inventory, networks, migration source</text>
  <text x="208" y="389" text-anchor="middle" class="tiny">Firewall rules must allow HCX flows</text>

  <rect x="1268" y="318" width="248" height="92" class="box"/>
  <text x="1392" y="345" text-anchor="middle" class="section-title">vCenter / NSX-T</text>
  <text x="1392" y="368" text-anchor="middle" class="small">Target SDDC inventory and overlays</text>
  <text x="1392" y="389" text-anchor="middle" class="tiny">OCVS VCN, VLANs, NSGs, route tables</text>

  <rect x="78" y="552" width="450" height="130" class="box"/>
  <text x="303" y="576" text-anchor="middle" class="section-title">Source ESXi Clusters and Workloads</text>
  <g transform="translate(104 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(250 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(396 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>

  <rect x="1072" y="552" width="450" height="130" class="box"/>
  <text x="1297" y="576" text-anchor="middle" class="section-title">Target OCVS ESXi Clusters and Workloads</text>
  <g transform="translate(1098 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(1244 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(1390 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>

  <path class="line-blue" marker-end="url(#arrow-blue)" d="M528 604 C650 570 950 570 1072 604"/>
  <text x="800" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0b5cab">Migration flows: vMotion, Bulk Migration, Replication Assisted vMotion</text>
  <path class="line-green" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)" d="M528 646 C650 690 950 690 1072 646"/>
  <text x="800" y="704" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#15803d">Optional L2 Network Extension for IP retention during migration</text>

  <rect x="610" y="610" width="380" height="64" class="box-red"/>
  <text x="800" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#9f1239">Design note</text>
  <text x="800" y="656" text-anchor="middle" class="small">HCX DR is deprecated in HCX 4.11 release notes.</text>
  <text x="800" y="674" text-anchor="middle" class="tiny">Use SRM / VMware Live Recovery or third-party DR for enterprise DR.</text>

  <rect x="35" y="760" width="1530" height="104" class="legend"/>
  <text x="60" y="788" class="section-title">Current design assumptions</text>
  <text x="60" y="815" class="small">1. OCVS uses customer-provided VMware licensing under BYOL for new capacity. Validate VCF, HCX, and migration tool entitlements before provisioning.</text>
  <text x="60" y="838" class="small">2. HCX Manager requires outbound connectivity for activation and updates. FastConnect is recommended for migration underlay but not mandatory.</text>
  <text x="60" y="861" class="small">3. Service Mesh deploys paired appliances such as Network Extension (NE), Interconnect (IX), and WAN Optimization (WO), based on enabled services and licensing.</text>
  <text x="1490" y="854" text-anchor="end" class="tiny">Generated for OCVS migration template - 2026-06-25</text>
</svg>
