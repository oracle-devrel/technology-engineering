  </g>
  <g transform="translate(250 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(396 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>

  <rect x="1072" y="552" width="450" height="130" class="box"/>
  <text x="1297" y="576" text-anchor="middle" class="section-title">Target OCVS ESXi Clusters and Workloads</text>
  <g transform="translate(1098 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(1244 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
  </g>
  <g transform="translate(1390 596)">
    <polygon class="host-base" points="0,42 92,42 76,82 16,82"/>
    <rect class="host" x="0" y="16" width="92" height="26"/>
    <text x="46" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">ESXi</text>
    <rect class="vm" x="8" y="0" width="18" height="14"/><rect class="vm" x="32" y="0" width="18" height="14"/><rect class="vm" x="56" y="0" width="18" height="14"/>
